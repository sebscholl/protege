name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: framework/package-lock.json

      - name: Install dependencies
        working-directory: framework
        run: npm ci

      - name: Resolve npm dist-tag
        id: verify_tag
        working-directory: framework
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${VERSION}" == *-* ]]; then
            echo "tag=alpha" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Typecheck
        working-directory: framework
        run: npm run typecheck

      - name: Test
        working-directory: framework
        run: npm run test

      - name: Build tarball
        working-directory: framework
        run: npm pack

      - name: Verify package publish payload
        working-directory: framework
        run: npm publish --dry-run --tag "${{ steps.verify_tag.outputs.tag }}"

  publish:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: framework/package-lock.json

      - name: Install dependencies
        working-directory: framework
        run: npm ci

      - name: Resolve npm dist-tag
        id: publish_tag
        working-directory: framework
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${VERSION}" == *-* ]]; then
            echo "tag=alpha" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: framework
        run: npm publish --tag "${{ steps.publish_tag.outputs.tag }}" --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
